appId: com.cineweave.studio
productName: CineWeave Studio
directories:
  buildResources: build
  output: dist
files:
  - out/**/*
  - "!node_modules/**/*"
win:
  target: [nsis]
mac:
  target: [dmg, zip]
  category: public.app-category.video
linux:
  target: [AppImage]
  category: Video
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
